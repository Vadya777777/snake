<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Молдавская Змейка 🇲🇩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --blue:#0046AE; --yellow:#FFD200; --red:#CC092F; --panel:#0e1838; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{font-family:'Manrope',sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #1a2a66 0%, transparent 60%),
               linear-gradient(160deg,#070d22 0%, #0a1230 55%, #070b1d 100%);
    color:#eaf0ff; min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:18px; -webkit-tap-highlight-color:transparent;}
  .app{display:flex; gap:18px; align-items:flex-start; justify-content:center; width:100%; max-width:730px;}
  .wrap{flex:0 1 460px; min-width:0;}

  .vocab{flex:0 0 210px; background:rgba(14,24,56,.7); border:1px solid #1f2e63; border-radius:16px; padding:14px; backdrop-filter:blur(4px);}
  .vocab h2{font-family:'Press Start 2P',monospace; font-size:9px; line-height:1.7; color:var(--yellow); margin-bottom:12px;}
  .vocab .list{display:flex; flex-direction:column; gap:8px; max-height:440px; overflow-y:auto;}
  .word{background:#101b41; border:1px solid #233a78; border-radius:10px; padding:8px 10px;}
  .word.cur{border-color:var(--yellow); box-shadow:0 0 0 1px var(--yellow);}
  .word .ro{font-weight:800; font-size:15px; color:#fff; display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .word .ru{font-size:12px; color:#a9bbed;}
  .word .pr{font-size:11px; color:#6f80b6; font-style:italic;}
  .word .say{background:none; border:none; cursor:pointer; font-size:14px; line-height:1; padding:2px; opacity:.8;}
  .word .say:active{transform:scale(.85);}
  .vocab .empty{font-size:12px; color:#7a89bd; line-height:1.5;}

  header{display:flex; align-items:flex-end; justify-content:space-between; gap:10px; margin-bottom:10px;}
  h1{font-family:'Press Start 2P',monospace; font-size:13px; line-height:1.6;}
  h1 .b{color:var(--blue);} h1 .y{color:var(--yellow);} h1 .r{color:var(--red);}
  .stat{text-align:right; font-family:'Press Start 2P',monospace; font-size:10px; color:#9fb0e0;}
  .stat b{display:block; font-size:18px; color:#fff; margin:6px 0 2px;}
  .stat small{font-size:8px; color:#7e8fc4;}

  .goal{font-size:12px; color:#cdd8ff; background:rgba(255,210,0,.1); border:1px solid rgba(255,210,0,.35);
        border-radius:10px; padding:8px 12px; margin-bottom:10px; text-align:center;}
  .goal b{color:var(--yellow);}

  .board-frame{position:relative; border-radius:18px; padding:10px;
    background:linear-gradient(135deg,var(--blue) 0 33%,var(--yellow) 33% 66%,var(--red) 66% 100%);
    box-shadow:0 24px 60px -20px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.08);}
  canvas#game{display:block; width:100%; height:auto; border-radius:10px; background:var(--panel); image-rendering:pixelated;}

  .overlay{position:absolute; inset:10px; border-radius:10px; background:rgba(6,11,30,.96); backdrop-filter:blur(6px);
    display:none; flex-direction:column; align-items:center; text-align:center; padding:22px 18px; overflow-y:auto;}
  .overlay.show{display:flex; animation:pop .35s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  .rank{font-family:'Press Start 2P',monospace; font-size:11px; color:var(--yellow); margin-bottom:6px;}
  .big{font-family:'Press Start 2P',monospace; font-size:14px; margin:4px 0 12px; line-height:1.6;}
  .fact{font-size:13px; line-height:1.5; color:#cdd8ff; border-left:3px solid var(--yellow); padding-left:12px; text-align:left; margin:0 0 14px;}
  .score-line{font-size:14px; color:#fff; margin-bottom:12px;} .score-line b{color:var(--yellow);}

  .song{display:flex; align-items:center; gap:10px; background:#101b41; border:1px solid #233a78; border-radius:12px;
    padding:10px 12px; margin-bottom:14px; text-decoration:none; color:#fff; width:100%;}
  .song:hover{border-color:var(--yellow);}
  .song .ico{font-size:20px;} .song .meta{text-align:left; flex:1;} .song .meta small{display:block; color:#9fb0e0; font-size:11px;}
  .song .meta span{font-weight:800; font-size:14px;} .song .go{font-size:11px; color:var(--yellow); white-space:nowrap;}

  .btn{font-family:'Press Start 2P',monospace; font-size:11px; cursor:pointer; border:none; border-radius:10px;
    padding:13px 20px; color:#06122e; margin:4px; background:linear-gradient(180deg,var(--yellow),#f2b800);
    box-shadow:0 7px 0 #a87b00; transition:transform .08s, box-shadow .08s;}
  .btn:active{transform:translateY(5px); box-shadow:0 2px 0 #a87b00;}
  .btn.ghost{background:#16224f; color:#cdd8ff; box-shadow:0 7px 0 #0c1638;}
  .btn.ghost:active{box-shadow:0 2px 0 #0c1638;}

  .passport-win{color:var(--yellow); font-family:'Press Start 2P',monospace; font-size:11px; line-height:1.6; margin-bottom:10px;}
  .pform{display:none; width:100%; max-width:340px; flex-direction:column; gap:10px; margin-bottom:8px;}
  .pform.show{display:flex;}
  .pform .row{display:flex; gap:8px;}
  .pform label{font-size:12px; color:#9fb0e0; text-align:left; display:flex; flex-direction:column; gap:4px; flex:1;}
  .pform input[type=text]{width:100%; background:#101b41; border:1px solid #233a78; border-radius:8px; padding:10px; color:#fff; font-family:inherit; font-size:14px;}
  .pform input[type=file]{font-size:12px; color:#cdd8ff;}
  #passportCanvas{display:none; width:100%; max-width:470px; border-radius:12px; margin:6px 0 12px; box-shadow:0 14px 34px -10px #000;}

  .pad{display:none; grid-template-columns:repeat(3,58px); grid-auto-rows:58px; gap:8px; justify-content:center; margin-top:14px;}
  .pad button{border:none; border-radius:12px; background:#16224f; color:#cdd8ff; font-size:22px; box-shadow:inset 0 0 0 1px #28386f;}
  .pad button:active{background:var(--blue); color:#fff;}
  .pad .up{grid-column:2;} .pad .left{grid-column:1;grid-row:2;} .pad .down{grid-column:2;grid-row:2;} .pad .right{grid-column:3;grid-row:2;}

  .controls{display:flex; gap:6px; justify-content:center; margin-top:12px; flex-wrap:wrap;}
  .mini{font-size:12px; cursor:pointer; background:#16224f; border:1px solid #28386f; color:#cdd8ff; border-radius:20px; padding:6px 12px;}
  .mini:active{background:var(--blue);}
  .mini.on{background:var(--blue); color:#fff; border-color:var(--blue);}
  .legend{margin-top:8px; font-size:11px; color:#7e8fc4; text-align:center; line-height:1.6;}
  .hint{margin-top:8px; font-size:12px; color:#8a98c8; text-align:center; line-height:1.6;}
  kbd{font-family:'Press Start 2P',monospace; font-size:9px; background:#1a2755; border:1px solid #2c3d77; border-radius:4px; padding:3px 6px; color:#cdd8ff;}

  @media (max-width:760px){
    .app{flex-direction:column-reverse; align-items:center;}
    .vocab{flex:1 1 auto; width:100%; max-width:460px;}
    .vocab .list{max-height:200px; flex-direction:row; flex-wrap:wrap;}
    .vocab .word{flex:1 1 130px;}
  }
  @media (hover:none) and (pointer:coarse){ .pad{display:grid;} .hint .keys{display:none;} }
</style>
</head>
<body>
<div class="app">
  <aside class="vocab">
    <h2 id="vocabTitle">📒 СЛОВАРИК</h2>
    <div class="list" id="vocabList"></div>
  </aside>

  <main class="wrap">
    <header>
      <h1><span class="b">МОЛ</span><span class="y">ДАВ</span><span class="r">СКАЯ</span><br>ЗМЕЙКА</h1>
      <div class="stat">ФЛАГИ<b id="score">0</b><small>рекорд: <span id="best">0</span></small></div>
    </header>

    <div class="goal" id="goal"></div>

    <div class="board-frame">
      <canvas id="game" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <div class="passport-win" id="passportWin"></div>
        <div class="rank" id="rank"></div>
        <div class="big" id="title"></div>
        <div class="fact" id="fact"></div>
        <div class="score-line">Собрано флагов: <b id="finalScore">0</b></div>
        <a class="song" id="song" target="_blank" rel="noopener">
          <span class="ico">🎵</span>
          <span class="meta"><small>Твой саундтрек</small><span id="songName"></span></span>
          <span class="go">▶ YouTube</span>
        </a>
        <button class="btn" id="passportBtn" style="display:none">🛂 ОФОРМИТЬ ПАСПОРТ</button>
        <div class="pform" id="pform">
          <label>Фото<input type="file" id="photoInput" accept="image/*"></label>
          <div class="row">
            <label>Фамилия<input type="text" id="surnameInput" placeholder="Молдован"></label>
            <label>Имя<input type="text" id="givenInput" placeholder="Ион"></label>
          </div>
          <label>Дата рождения<input type="text" id="dobInput" inputmode="numeric" placeholder="07/03/1999" maxlength="10"></label>
          <button class="btn" id="makePassport">СОЗДАТЬ ПАСПОРТ</button>
        </div>
        <canvas id="passportCanvas" width="660" height="416"></canvas>
        <div>
          <a class="btn ghost" id="downloadPassport" download="moldova-passport.png" style="display:none">⬇ СКАЧАТЬ</a>
          <button class="btn ghost" id="sharePassport" style="display:none">📤 ПОДЕЛИТЬСЯ</button>
        </div>
        <button class="btn" id="restart">ИГРАТЬ СНОВА</button>
      </div>
    </div>

    <div class="pad">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <button class="down" data-dir="down">▼</button>
      <button class="right" data-dir="right">▶</button>
    </div>

    <div class="controls">
      <button class="mini diff" data-d="easy">Лёгкий</button>
      <button class="mini diff" data-d="med">Средний</button>
      <button class="mini diff" data-d="hard">Сложный</button>
      <button class="mini" id="muteBtn"></button>
    </div>
    <p class="legend">🛢️ бочки — препятствия · 🍾 бутылка вина — +3 флага</p>
    <p class="hint"><span class="keys">Управление: <kbd>↑↓←→</kbd> / <kbd>WASD</kbd> · пауза <kbd>SPACE</kbd> · </span>Собирай флаги Молдовы 🇲🇩</p>
  </main>
</div>

function unlockAudio(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(actx&&actx.state==='suspended')actx.resume(); try{primeAudio();}catch(e){} }
function loadVoices(){ if(!('speechSynthesis'in window))return; const vs=speechSynthesis.getVoices(); roVoice=vs.find(v=>/ro|român|moldov/i.test(v.lang+v.name))||null; }
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function gtUrl(t){ return 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ro&client=tw-ob&q='+encodeURIComponent(t); }
function speakFallback(t){ if(!('speechSynthesis'in window))return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t.replace(/\s*\/\s*/g,', '));
    if(roVoice){u.voice=roVoice;u.lang=roVoice.lang;}else u.lang='ro-RO'; u.rate=.95; speechSynthesis.speak(u);}catch(e){} }
const roCache={};
function getRo(text){
  if(!roCache[text]){ const a=new Audio(); a.preload='auto'; a.src=gtUrl(text.replace(/\s*\/\s*/g,', '));
    a.addEventListener('error',function(){a._bad=true;}); roCache[text]=a; }
  return roCache[text];
}
let meiAudio=null;
function getMei(){
  if(!meiAudio){ meiAudio=new Audio(); meiAudio.preload='auto'; meiAudio.src=MEI_SOUND||gtUrl('măi');
    meiAudio.addEventListener('error',function(){meiAudio._bad=true;}); }
  return meiAudio;
}
function sayMei(){
  if(!voiceOn)return; const a=getMei();
  if(a._bad){ if(!MEI_SOUND)speakFallback('măi'); return; }
  try{ a.currentTime=0; const p=a.play(); if(p&&p.catch)p.catch(function(){if(!MEI_SOUND)speakFallback('măi');}); }catch(e){}
}
function speak(text){
  const a=getRo(text);
  if(a._bad){ speakFallback(text); return; }
  try{ a.currentTime=0; const p=a.play(); if(p&&p.catch)p.catch(function(){speakFallback(text);}); }catch(e){ speakFallback(text); }
}
// Звук бонусной бутылки: '' = голос «Noroc!» из переводчика. Можно вписать свой файл/data-URI:
const NOROC_SOUND='';
let norocAudio=null;
function sayNoroc(){
  if(!voiceOn)return;
  if(!norocAudio){ norocAudio=new Audio(); norocAudio.preload='auto'; norocAudio.src=NOROC_SOUND||gtUrl('Noroc');
    norocAudio.addEventListener('error',function(){norocAudio._bad=true;}); }
  var a=norocAudio;
  if(a._bad){ if(!NOROC_SOUND)speakFallback('Noroc'); return; }
  try{ a.currentTime=0; var p=a.play(); if(p&&p.catch)p.catch(function(){if(!NOROC_SOUND)speakFallback('Noroc');}); }catch(e){}
}
const muteBtn=document.getElementById('muteBtn');
// Разблокировка звука внутри первого жеста (нужно для Safari/iOS):
let audioPrimed=false;
function primeAudio(){
  if(audioPrimed)return; audioPrimed=true;
  if(!norocAudio){ norocAudio=new Audio(); norocAudio.preload='auto'; norocAudio.src=NOROC_SOUND||gtUrl('Noroc'); norocAudio.addEventListener('error',function(){norocAudio._bad=true;}); }
  [getMei(),norocAudio].forEach(function(a){
    try{ a.muted=true; var p=a.play();
      if(p&&p.then){ p.then(function(){a.pause();a.currentTime=0;a.muted=false;}).catch(function(){a.muted=false;}); }
      else { a.muted=false; }
    }catch(e){ a.muted=false; }
  });
}
function renderMute(){ muteBtn.textContent=voiceOn?'🔊 Голос «мэй»: вкл':'🔇 Голос «мэй»: выкл'; }
muteBtn.addEventListener('click',function(){voiceOn=!voiceOn;store.set('voiceOn',voiceOn);renderMute();unlockAudio();if(voiceOn)sayMei();});
renderMute();

let learned=store.get('learnedWords',[]); let currentWordIdx=0;
function pickWordForGame(){
  if(learned.length<WORDS.length){currentWordIdx=learned.length;learned.push(currentWordIdx);}
  else{const c=store.get('cycle',0);currentWordIdx=c%WORDS.length;store.set('cycle',c+1);}
  store.set('learnedWords',learned); renderVocab();
}
function renderVocab(){
  document.getElementById('vocabTitle').textContent='📒 СЛОВАРИК '+learned.length+'/'+WORDS.length;
  const el=document.getElementById('vocabList');
  if(!learned.length){el.innerHTML='<div class="empty">Каждую игру ты учишь одно молдавское слово. Жми 🔊, чтобы услышать.</div>';return;}
  el.innerHTML=learned.map(function(i){var w=WORDS[i];var cur=i===currentWordIdx?' cur':'';
    return '<div class="word'+cur+'"><div class="ro">'+w.ro+'<button class="say" data-i="'+i+'">🔊</button></div><div class="ru">'+w.ru+'</div><div class="pr">['+w.pr+']</div></div>';}).join('');
}
document.getElementById('vocabList').addEventListener('click',function(e){var b=e.target.closest('.say'); if(!b)return; speak(WORDS[+b.dataset.i].ro);});

const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const GRID=20,CELL=canvas.width/GRID;
const scoreEl=document.getElementById('score'),overlay=document.getElementById('overlay');
let best=store.get('best',0); document.getElementById('best').textContent=best;
let diff=store.get('diff','med'); if(!DIFFS[diff])diff='med';
let snake,dir,dirQueue,food,bonus,obstacles,grow,score,speed,loopTimer,alive,paused;

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function occupied(c){
  if(snake&&snake.some(function(s){return s.x===c.x&&s.y===c.y;}))return true;
  if(obstacles&&obstacles.some(function(o){return o.x===c.x&&o.y===c.y;}))return true;
  if(food&&food.x===c.x&&food.y===c.y)return true;
  if(bonus&&bonus.x===c.x&&bonus.y===c.y)return true;
  return false;
}
function randEmpty(){ for(var i=0;i<400;i++){var c={x:(Math.random()*GRID)|0,y:(Math.random()*GRID)|0}; if(!occupied(c))return c;} return null; }
function placeObstacles(n){
  obstacles=[]; var tries=0;
  while(obstacles.length<n&&tries<800){ tries++;
    var c={x:(Math.random()*GRID)|0,y:(Math.random()*GRID)|0};
    if(c.y>=9&&c.y<=11&&c.x>=3&&c.x<=16)continue;            // коридор у старта свободен
    if(obstacles.some(function(o){return o.x===c.x&&o.y===c.y;}))continue;
    obstacles.push(c);
  }
}
function placeFood(){ var c=randEmpty(); if(c)food=c; }
function maybeBonus(){ if(bonus)return; if(Math.random()<0.20){var c=randEmpty(); if(c)bonus={x:c.x,y:c.y,ttl:55};} }

function drawFlag(cx,cy){
  var pad=2,x=cx*CELL+pad,y=cy*CELL+pad,w=CELL-pad*2,h=CELL-pad*2,s=w/3,oy=Math.sin(Date.now()/300)*1.2;
  ctx.save();ctx.translate(0,oy);
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(x,y+2,w,h);
  ctx.fillStyle='#0046AE';ctx.fillRect(x,y,s,h);ctx.fillStyle='#FFD200';ctx.fillRect(x+s,y,s,h);ctx.fillStyle='#CC092F';ctx.fillRect(x+2*s,y,s,h);
  ctx.fillStyle='#7a2e12';ctx.beginPath();ctx.arc(x+w/2,y+h/2,Math.max(1.6,s*.16),0,7);ctx.fill();ctx.restore();
}
function drawBarrel(cx,cy){
  var x=cx*CELL,y=cy*CELL,w=CELL,h=CELL;
  ctx.fillStyle='#7a4a22'; rr(x+3,y+2,w-6,h-4,4); ctx.fill();
  ctx.fillStyle='#8c5a2c'; ctx.fillRect(x+w*0.34,y+2,2,h-4); ctx.fillRect(x+w*0.6,y+2,2,h-4);
  ctx.fillStyle='#caa05a'; ctx.fillRect(x+3,y+h*0.28,w-6,2.5); ctx.fillRect(x+3,y+h*0.64,w-6,2.5);
}
function drawBottle(cx,cy,ttl){
  var x=cx*CELL,y=cy*CELL,w=CELL,h=CELL;
  ctx.save(); if(ttl<12&&Math.floor(Date.now()/150)%2===0)ctx.globalAlpha=.4;
  ctx.fillStyle='#b98a4a'; ctx.fillRect(x+w*0.4,y+1,w*0.2,3);
  ctx.fillStyle='#1f7a3d'; rr(x+w*0.4,y+3,w*0.2,h*0.4,2); ctx.fill();
  rr(x+w*0.24,y+h*0.34,w*0.52,h*0.6,5); ctx.fill();
  ctx.fillStyle='#f5e6c0'; ctx.fillRect(x+w*0.28,y+h*0.56,w*0.44,h*0.2);
  ctx.restore();
}
function draw(){
  for(var i=0;i<GRID;i++)for(var j=0;j<GRID;j++){ctx.fillStyle=((i+j)%2===0)?'#13204a':'#101b41';ctx.fillRect(i*CELL,j*CELL,CELL,CELL);}
  if(obstacles)obstacles.forEach(function(o){drawBarrel(o.x,o.y);});
  if(food)drawFlag(food.x,food.y);
  if(bonus)drawBottle(bonus.x,bonus.y,bonus.ttl);
  if(snake)snake.forEach(function(s,i){var x=s.x*CELL,y=s.y*CELL;
    if(i===0){ctx.fillStyle='#FFD200';rr(x+1,y+1,CELL-2,CELL-2,5);ctx.fill();ctx.fillStyle='#06122e';var ex=dir.x,ey=dir.y;
      ctx.beginPath();ctx.arc(x+CELL/2+ex*3-(ey!==0?3:0),y+CELL/2+ey*3-(ex!==0?3:0),2,0,7);ctx.fill();
      ctx.beginPath();ctx.arc(x+CELL/2+ex*3+(ey!==0?3:0),y+CELL/2+ey*3+(ex!==0?3:0),2,0,7);ctx.fill();}
    else{ctx.fillStyle=(i%2===0)?'#0046AE':'#CC092F';rr(x+2,y+2,CELL-4,CELL-4,4);ctx.fill();}});
  if(paused&&alive){ctx.fillStyle='rgba(6,11,30,.6)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#FFD200';ctx.font='700 22px Manrope';ctx.textAlign='center';ctx.fillText('ПАУЗА',canvas.width/2,canvas.height/2);ctx.textAlign='left';}
}

function updateScore(){scoreEl.textContent=score;}
function speedUp(){ if(speed>60)speed-=3; }
function reset(){
  document.getElementById('pform').classList.remove('show');
  document.getElementById('passportCanvas').style.display='none';
  document.getElementById('downloadPassport').style.display='none';
  document.getElementById('sharePassport').style.display='none';
  document.getElementById('passportBtn').style.display='none';
  document.getElementById('passportWin').textContent='';
  overlay.classList.remove('show');
  pickWordForGame();
  snake=[{x:9,y:10},{x:8,y:10},{x:7,y:10}];dir={x:1,y:0};dirQueue=[];grow=0;bonus=null;
  score=0;updateScore();speed=DIFFS[diff].speed;alive=true;paused=false;
  placeObstacles(DIFFS[diff].barrels);placeFood();
  clearTimeout(loopTimer);loop();
}
function loop(){
  loopTimer=setTimeout(loop,speed);
  if(!alive||paused)return;
  step();
}
function step(){
  if(dirQueue.length)dir=dirQueue.shift();
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID)return gameOver();
  if(snake.some(function(s){return s.x===head.x&&s.y===head.y;}))return gameOver();
  if(obstacles.some(function(o){return o.x===head.x&&o.y===head.y;}))return gameOver();
  snake.unshift(head);
  if(food&&head.x===food.x&&head.y===food.y){ score++;updateScore();sayMei();pop();placeFood();maybeBonus();speedUp(); }
  else if(bonus&&head.x===bonus.x&&head.y===bonus.y){ score+=3;updateScore();grow+=2;bonus=null;bonusBlip();sayNoroc();speedUp(); }
  else if(grow>0){ grow--; }
  else snake.pop();
  if(bonus){ bonus.ttl--; if(bonus.ttl<=0)bonus=null; }
  draw();
}
function pop(){ if(!actx)return;var o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle';o.frequency.setValueAtTime(680,actx.currentTime);o.frequency.exponentialRampToValueAtTime(1100,actx.currentTime+.08);
  g.gain.setValueAtTime(.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+.12); }
function bonusBlip(){ if(!actx)return;[659,880,1175].forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+i*.08;
  o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.16,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.16);
  o.connect(g).connect(actx.destination);o.start(t);o.stop(t+.18);}); }
function fanfare(tier){ if(!actx)return;var base=[523,659,784,1047];var notes=tier>=2?base.concat([1319]):tier>=1?base:[392,523,659];
  notes.forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+i*.12;
    o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.13,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.18);
    o.connect(g).connect(actx.destination);o.start(t);o.stop(t+.2);}); }

function gameOver(){
  alive=false;clearTimeout(loopTimer);
  if(score>best){best=score;store.set('best',best);document.getElementById('best').textContent=best;}
  var r=rankFor(score),s=songFor(score),tier=score>=15?2:score>=6?1:0;
  document.getElementById('rank').textContent='★ '+r.name+' ★';
  document.getElementById('title').textContent=r.line;
  document.getElementById('fact').textContent='🇲🇩 А ты знал? '+FACTS[(Math.random()*FACTS.length)|0];
  document.getElementById('finalScore').textContent=score;
  document.getElementById('songName').textContent=s.a+' — '+s.t;
  document.getElementById('song').href='https://www.youtube.com/results?search_query='+encodeURIComponent(s.a+' '+s.t);
  var pw=document.getElementById('passportWin'),pbtn=document.getElementById('passportBtn');
  if(score>=PASSPORT_AT){pw.textContent='🎉 ПАСПОРТ РАЗБЛОКИРОВАН! 🎉';pbtn.style.display='inline-block';}
  else{var need=PASSPORT_AT-score;document.getElementById('fact').textContent+='  (До паспорта не хватило '+need+' '+(need===1?'флага':'флагов')+'!)';}
  fanfare(tier);overlay.classList.add('show');
}

/* ── паспорт ── */
let passportPhoto=null; const pc=document.getElementById('passportCanvas');
function drawCover(x,img,dx,dy,dw,dh){var ir=img.width/img.height,br=dw/dh,sw,sh,sx,sy;
  if(ir>br){sh=img.height;sw=sh*br;sx=(img.width-sw)/2;sy=0;}else{sw=img.width;sh=sw/br;sx=0;sy=(img.height-sh)/2;}
  x.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);}
function fitText(x,text,px,py,maxw){var size=parseInt(x.font);while(size>10&&x.measureText(text).width>maxw){size--;x.font=x.font.replace(/[\d.]+px/,size+'px');}x.fillText(text,px,py);}
function star(x,cx,cy,sp,outer,inner){var rot=-Math.PI/2,step=Math.PI/sp;x.beginPath();x.moveTo(cx+Math.cos(rot)*outer,cy+Math.sin(rot)*outer);
  for(var i=0;i<sp;i++){rot+=step;x.lineTo(cx+Math.cos(rot)*inner,cy+Math.sin(rot)*inner);rot+=step;x.lineTo(cx+Math.cos(rot)*outer,cy+Math.sin(rot)*outer);}x.closePath();x.fill();}
function drawEmblem(x,cx,cy,r){x.save();x.translate(cx,cy);
  x.fillStyle='rgba(7,28,70,.55)';x.beginPath();x.arc(0,0,r+5,0,7);x.fill();x.strokeStyle='#FFD200';x.lineWidth=1.5;x.stroke();
  var s=r/13;x.strokeStyle='#FFD200';x.lineWidth=2.6*s;x.lineCap='round';
  x.beginPath();x.moveTo(-5*s,-2*s);x.quadraticCurveTo(-13*s,-8*s,-9*s,-16*s);x.moveTo(5*s,-2*s);x.quadraticCurveTo(13*s,-8*s,9*s,-16*s);x.stroke();
  x.fillStyle='#FFD200';x.beginPath();x.moveTo(-6*s,-3*s);x.quadraticCurveTo(0,-7*s,6*s,-3*s);x.quadraticCurveTo(7*s,5*s,0,10*s);x.quadraticCurveTo(-7*s,5*s,-6*s,-3*s);x.closePath();x.fill();
  x.fillStyle='#071c46';x.beginPath();x.arc(-2.6*s,0,1.1*s,0,7);x.fill();x.beginPath();x.arc(2.6*s,0,1.1*s,0,7);x.fill();
  x.fillStyle='#FFD200';star(x,0,-19*s,8,3*s,1.4*s);x.restore();}
var TL={'а':'A','б':'B','в':'V','г':'G','д':'D','е':'E','ё':'E','ж':'ZH','з':'Z','и':'I','й':'I','к':'K','л':'L','м':'M','н':'N','о':'O','п':'P','р':'R','с':'S','т':'T','у':'U','ф':'F','х':'H','ц':'TS','ч':'CH','ш':'SH','щ':'SH','ъ':'','ы':'Y','ь':'','э':'E','ю':'IU','я':'IA',' ':'<'};
function translit(str){return (str||'').toLowerCase().split('').map(function(c){return TL[c]!==undefined?TL[c]:c;}).join('').toUpperCase().replace(/[^A-Z<]/g,'<');}
function makePassport(){
  var x=pc.getContext('2d'),W=pc.width,H=pc.height;
  var surname=document.getElementById('surnameInput').value.trim();
  var given=document.getElementById('givenInput').value.trim();
  var dob=document.getElementById('dobInput').value.trim();
  var no=String(Math.floor(1000000+Math.random()*9000000));
  var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0b327a');g.addColorStop(1,'#071c46');x.fillStyle=g;x.fillRect(0,0,W,H);
  x.save();x.globalAlpha=.06;x.strokeStyle='#bcd0ff';x.lineWidth=1;
  for(var yy=24;yy<H-50;yy+=13){x.beginPath();for(var xx=24;xx<=W-24;xx+=6){var yv=yy+Math.sin((xx/W)*Math.PI*9+yy)*4;xx===24?x.moveTo(xx,yv):x.lineTo(xx,yv);}x.stroke();}x.restore();
  x.strokeStyle='rgba(255,210,0,.7)';x.lineWidth=2;x.strokeRect(12,12,W-24,H-24);x.strokeStyle='rgba(255,210,0,.3)';x.lineWidth=1;x.strokeRect(17,17,W-34,H-34);
  var third=(H-24)/3;x.fillStyle='#0046AE';x.fillRect(12,12,9,third);x.fillStyle='#FFD200';x.fillRect(12,12+third,9,third);x.fillStyle='#CC092F';x.fillRect(12,12+2*third,9,third);
  drawEmblem(x,62,52,22);
  x.textAlign='left';x.fillStyle='#FFD200';x.font='800 20px Manrope';x.fillText('REPUBLICA MOLDOVA',96,46);
  x.fillStyle='#cfe0ff';x.font='600 12px Manrope';x.fillText('REPUBLIC OF MOLDOVA',96,63);
  x.textAlign='right';x.fillStyle='#FFD200';x.font='800 22px Manrope';x.fillText('PAȘAPORT',W-40,44);
  x.fillStyle='#cfe0ff';x.font='600 11px Manrope';x.fillText('PASSPORT · Tip/Type: P',W-40,62);
  x.strokeStyle='rgba(255,210,0,.4)';x.lineWidth=1;x.beginPath();x.moveTo(40,80);x.lineTo(W-40,80);x.stroke();
  var px=40,py=98,pw=148,ph=186;
  x.fillStyle='#e8eeff';x.fillRect(px-3,py-3,pw+6,ph+6);
  if(passportPhoto)drawCover(x,passportPhoto,px,py,pw,ph);else{x.fillStyle='#16244f';x.fillRect(px,py,pw,ph);x.fillStyle='#5b6fa8';x.font='600 13px Manrope';x.textAlign='center';x.fillText('ФОТО',px+pw/2,py+ph/2);}
  x.strokeStyle='rgba(0,0,0,.25)';x.lineWidth=1;x.strokeRect(px,py,pw,ph);
  x.textAlign='left';x.fillStyle='#cfe0ff';x.font='700 13px monospace';x.fillText('Nr. AB'+no,px,py+ph+22);
  var fx=212,vw=W-fx-44,fy=110;
  function field(label,value){x.textAlign='left';x.fillStyle='#8fb0ff';x.font='600 10.5px Manrope';x.fillText(label.toUpperCase(),fx,fy);
    x.fillStyle='#fff';x.font='700 16px Manrope';fitText(x,value||'—',fx,fy+18,vw);fy+=39;}
  field('Nume / Surname',surname);field('Prenume / Given names',given);field('Cetățenia / Nationality','Republica Moldova');
  field('Data nașterii / Date of birth',dob);field('Locul nașterii / Place of birth','Chișinău');field('Specialitate / Speciality','Colecționar de steaguri');
  var mz=H-56;x.fillStyle='rgba(232,238,255,.94)';x.fillRect(28,mz,W-56,40);
  var dobm='<<<<<<';var dd=dob.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(dd)dobm=dd[3].slice(2)+dd[2]+dd[1];
  var mrz1=('P<MDA'+translit(surname)+'<<'+translit(given)).padEnd(44,'<').slice(0,44);
  var mrz2=('AB'+no+'<MDA'+dobm+'M<<<<<<<COLECTIONAR').padEnd(44,'<').slice(0,44);
  x.fillStyle='#0a1a3a';x.font='700 13px monospace';x.textAlign='left';x.fillText(mrz1,38,mz+17);x.fillText(mrz2,38,mz+34);
  x.save();x.translate(W/2,H/2-20);x.rotate(-Math.PI/10);x.fillStyle='rgba(255,255,255,.08)';x.font='800 64px Manrope';x.textAlign='center';x.fillText('SUVENIR',0,0);x.restore();
  x.fillStyle='rgba(207,224,255,.5)';x.font='600 9px Manrope';x.textAlign='right';x.fillText('Сувенир · не является документом',W-40,mz-6);
  pc.style.display='block';
  var dl=document.getElementById('downloadPassport');dl.href=pc.toDataURL('image/png');dl.style.display='inline-block';
  document.getElementById('sharePassport').style.display='inline-block';
}
async function sharePassport(){
  try{
    if(!pc.toBlob){document.getElementById('downloadPassport').click();return;}
    var blob=await new Promise(function(res){pc.toBlob(res,'image/png');});
    var file=new File([blob],'moldova-passport.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Молдавский паспорт 🇲🇩',text:'Получил молдавский паспорт в игре «Молдавская Змейка»! 🇲🇩'});
    }else{ document.getElementById('downloadPassport').click(); }
  }catch(e){}
}

/* ── управление (с очередью ввода — отзывчивые повороты) ── */
function pushDir(v){ if(!alive)return; var last=dirQueue.length?dirQueue[dirQueue.length-1]:dir;
  if((v.x===-last.x&&v.y===-last.y)||(v.x===last.x&&v.y===last.y))return; if(dirQueue.length<2)dirQueue.push(v); }
function setDir(d){ if(d==='up')pushDir({x:0,y:-1});if(d==='down')pushDir({x:0,y:1});if(d==='left')pushDir({x:-1,y:0});if(d==='right')pushDir({x:1,y:0}); }
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  unlockAudio();var k=e.key.toLowerCase();
  if(['arrowup','w'].includes(k)){if(alive)setDir('up');e.preventDefault();}
  if(['arrowdown','s'].includes(k)){if(alive)setDir('down');e.preventDefault();}
  if(['arrowleft','a'].includes(k)){if(alive)setDir('left');e.preventDefault();}
  if(['arrowright','d'].includes(k)){if(alive)setDir('right');e.preventDefault();}
  if(k===' '){if(alive)paused=!paused;e.preventDefault();}
});
document.querySelectorAll('.pad button').forEach(function(b){b.addEventListener('click',function(){unlockAudio();setDir(b.dataset.dir);});});
var tx,ty;
canvas.addEventListener('touchstart',function(e){unlockAudio();var t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
canvas.addEventListener('touchend',function(e){var t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?'right':'left');else setDir(dy>0?'down':'up');},{passive:true});

document.getElementById('dobInput').addEventListener('input',function(e){var v=e.target.value.replace(/\D/g,'').slice(0,8);
  e.target.value=v.length>4?v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4):v.length>2?v.slice(0,2)+'/'+v.slice(2):v;});
document.getElementById('passportBtn').addEventListener('click',function(){document.getElementById('pform').classList.add('show');});
document.getElementById('photoInput').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){var img=new Image();img.onload=function(){passportPhoto=img;};img.src=r.result;};r.readAsDataURL(f);});
document.getElementById('makePassport').addEventListener('click',makePassport);
document.getElementById('sharePassport').addEventListener('click',sharePassport);
document.getElementById('restart').addEventListener('click',function(){unlockAudio();reset();});

function renderDiff(){document.querySelectorAll('.diff').forEach(function(b){b.classList.toggle('on',b.dataset.d===diff);});}
document.querySelectorAll('.diff').forEach(function(b){b.addEventListener('click',function(){diff=b.dataset.d;store.set('diff',diff);renderDiff();unlockAudio();reset();});});
