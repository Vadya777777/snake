<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Молдавская Змейка 🇲🇩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0046AE;
    --yellow:#FFD200;
    --red:#CC092F;
    --ink:#0a1230;
    --panel:#0e1838;
    --grid-a:#13204a;
    --grid-b:#101b41;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Manrope',sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a2a66 0%, transparent 60%),
      linear-gradient(160deg,#070d22 0%, #0a1230 55%, #070b1d 100%);
    color:#eaf0ff;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:18px;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{width:100%;max-width:460px;}
  header{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:10px;margin-bottom:12px;
  }
  h1{
    font-family:'Press Start 2P',monospace;
    font-size:13px;line-height:1.6;letter-spacing:.5px;
  }
  h1 .b{color:var(--blue);text-shadow:0 0 12px rgba(0,80,220,.6);}
  h1 .y{color:var(--yellow);text-shadow:0 0 12px rgba(255,210,0,.5);}
  h1 .r{color:var(--red);text-shadow:0 0 12px rgba(204,9,47,.6);}
  .stat{
    text-align:right;
    font-family:'Press Start 2P',monospace;
    font-size:10px;color:#9fb0e0;
  }
  .stat b{display:block;font-size:18px;color:#fff;margin-top:6px;}
  .board-frame{
    position:relative;
    border-radius:18px;
    padding:10px;
    background:linear-gradient(135deg,var(--blue) 0%,var(--blue) 33%,var(--yellow) 33%,var(--yellow) 66%,var(--red) 66%,var(--red) 100%);
    box-shadow:0 24px 60px -20px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.08);
  }
  canvas{
    display:block;width:100%;height:auto;border-radius:10px;
    background:var(--panel);image-rendering:pixelated;
  }
  /* overlay */
  .overlay{
    position:absolute;inset:10px;border-radius:10px;
    background:rgba(6,11,30,.92);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px 20px;
  }
  .overlay.show{display:flex;animation:pop .35s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
  .rank{
    font-family:'Press Start 2P',monospace;font-size:11px;color:var(--yellow);
    margin-bottom:6px;letter-spacing:.5px;
  }
  .big{font-family:'Press Start 2P',monospace;font-size:18px;margin:4px 0 14px;}
  .fact{
    font-size:14px;line-height:1.55;color:#cdd8ff;max-width:320px;
    border-left:3px solid var(--yellow);padding-left:12px;text-align:left;margin:0 auto 18px;
  }
  .score-line{font-size:15px;color:#fff;margin-bottom:18px;}
  .score-line b{color:var(--yellow);}
  .btn{
    font-family:'Press Start 2P',monospace;font-size:11px;cursor:pointer;
    border:none;border-radius:10px;padding:14px 22px;color:#06122e;
    background:linear-gradient(180deg,var(--yellow),#f2b800);
    box-shadow:0 8px 0 #a87b00, 0 14px 24px -8px rgba(255,210,0,.5);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(6px);box-shadow:0 2px 0 #a87b00;}
  .hint{
    margin-top:14px;font-size:12px;color:#8a98c8;text-align:center;line-height:1.6;
  }
  kbd{
    font-family:'Press Start 2P',monospace;font-size:9px;background:#1a2755;
    border:1px solid #2c3d77;border-radius:4px;padding:3px 6px;color:#cdd8ff;
  }
  /* mobile dpad */
  .pad{display:none;grid-template-columns:repeat(3,60px);grid-auto-rows:60px;
    gap:8px;justify-content:center;margin-top:16px;}
  .pad button{
    border:none;border-radius:12px;background:#16224f;color:#cdd8ff;font-size:22px;
    box-shadow:inset 0 0 0 1px #28386f;
  }
  .pad button:active{background:var(--blue);color:#fff;}
  .pad .up{grid-column:2;}
  .pad .left{grid-column:1;grid-row:2;}
  .pad .down{grid-column:2;grid-row:2;}
  .pad .right{grid-column:3;grid-row:2;}
  @media (hover:none) and (pointer:coarse){ .pad{display:grid;} .hint .keys{display:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="b">МОЛ</span><span class="y">ДАВ</span><span class="r">СКАЯ</span><br>ЗМЕЙКА</h1>
    <div class="stat">ФЛАГИ<b id="score">0</b></div>
  </header>

  <div class="board-frame">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="rank" id="rank">РАНГ</div>
      <div class="big" id="title">GAME OVER</div>
      <div class="fact" id="fact"></div>
      <div class="score-line">Собрано флагов: <b id="finalScore">0</b></div>
      <button class="btn" id="restart">ИГРАТЬ СНОВА</button>
    </div>
  </div>

  <div class="pad">
    <button class="up" data-dir="up">▲</button>
    <button class="left" data-dir="left">◀</button>
    <button class="down" data-dir="down">▼</button>
    <button class="right" data-dir="right">▶</button>
  </div>

  <p class="hint">
    <span class="keys">Управление: <kbd>↑↓←→</kbd> или <kbd>WASD</kbd> · пауза <kbd>SPACE</kbd></span>
    <span class="keys"> · </span>Собирай флаги Молдовы 🇲🇩
  </p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;                 // 20x20 cells
const CELL = canvas.width / GRID;
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');

let snake, dir, nextDir, food, score, speed, loopTimer, alive, paused;

// ── Молдавские факты и ранги для экрана проигрыша ──
const FACTS = [
  "В Молдове находятся крупнейшие винные погреба в мире — Милештий Мичь, более 200 км туннелей с бутылками.",
  "Молдавский флаг — один из немногих в мире, у которого лицевая и обратная стороны выглядят по-разному.",
  "Национальное блюдо — мамалыга: кукурузная каша, которую едят почти со всем.",
  "Молдова — одна из самых «винных» стран мира по производству вина на душу населения.",
  "Криково — это целый подземный винный город с улицами, названными в честь вин.",
  "Молдавские свадьбы могут собирать по 300–500 гостей. Тебя бы точно позвали.",
  "Гимн Молдовы называется «Limba noastră» — «Наш язык». Единственный гимн, посвящённый языку.",
  "Плэчинта — слоёный пирог с брынзой, тыквой или картошкой. Опасно вкусно.",
  "Молдова — одна из наименее посещаемых стран Европы. Тем ценнее каждый флаг.",
  "В Молдове ежегодно отмечают Национальный день вина — в первые выходные октября.",
];
const RANKS = [
  {min:0,  name:"ТУРИСТ",            line:"Только приехал. Заблудился у границы."},
  {min:3,  name:"ГОСТЬ НА СВАДЬБЕ",  line:"Тебя уже зовут танцевать хору."},
  {min:6,  name:"ЛЮБИТЕЛЬ ПЛЭЧИНТЫ", line:"Знаешь, где самая вкусная выпечка."},
  {min:10, name:"ЗНАТОК ВИНА",       line:"Различаешь Криково и Милештий на вкус."},
  {min:15, name:"ХОЗЯИН ПОГРЕБА",    line:"У тебя свой туннель в Криково."},
  {min:22, name:"БАБУШКИН ЛЮБИМЕЦ",  line:"Тебе всегда кладут добавку."},
  {min:30, name:"ПОЧЁТНЫЙ МОЛДАВАНИН",line:"Народ слагает о тебе песни."},
];

function rankFor(n){
  let r = RANKS[0];
  for(const x of RANKS){ if(n>=x.min) r=x; }
  return r;
}

// ── Рисование молдавского флага в клетке ──
function drawFlag(cx, cy){
  const pad = 2;
  const x = cx*CELL + pad, y = cy*CELL + pad;
  const w = CELL - pad*2, h = CELL - pad*2;
  const s = w/3;
  // лёгкое «парение»
  const t = Date.now()/300;
  const oy = Math.sin(t)*1.2;
  ctx.save();
  ctx.translate(0, oy);
  // тень
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fillRect(x, y+2, w, h);
  // полосы
  ctx.fillStyle = '#0046AE'; ctx.fillRect(x, y, s, h);
  ctx.fillStyle = '#FFD200'; ctx.fillRect(x+s, y, s, h);
  ctx.fillStyle = '#CC092F'; ctx.fillRect(x+2*s, y, s, h);
  // мини-герб (точка в центре жёлтой полосы)
  ctx.fillStyle = '#7a2e12';
  ctx.beginPath();
  ctx.arc(x+w/2, y+h/2, Math.max(1.6, s*0.16), 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function reset(){
  snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  speed = 130;
  alive = true;
  paused = false;
  scoreEl.textContent = '0';
  overlay.classList.remove('show');
  placeFood();
  clearInterval(loopTimer);
  loopTimer = setInterval(tick, speed);
}

function placeFood(){
  while(true){
    const f = {x:(Math.random()*GRID)|0, y:(Math.random()*GRID)|0};
    if(!snake.some(s=>s.x===f.x && s.y===f.y)){ food=f; return; }
  }
}

function tick(){
  if(!alive || paused) return;
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

  // столкновение со стеной или собой
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||
     snake.some(s=>s.x===head.x && s.y===head.y)){
    gameOver();
    return;
  }

  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score++;
    scoreEl.textContent = score;
    placeFood();
    // плавное ускорение
    if(speed>60){ speed -= 4; clearInterval(loopTimer); loopTimer=setInterval(tick,speed); }
  } else {
    snake.pop();
  }
  draw();
}

function draw(){
  // фон-шахматка
  for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++){
    ctx.fillStyle = ((i+j)%2===0)?'#13204a':'#101b41';
    ctx.fillRect(i*CELL,j*CELL,CELL,CELL);
  }
  // еда — флаг
  drawFlag(food.x, food.y);
  // змейка
  snake.forEach((s,i)=>{
    const x=s.x*CELL, y=s.y*CELL;
    if(i===0){
      ctx.fillStyle='#FFD200';
      roundRect(x+1,y+1,CELL-2,CELL-2,5); ctx.fill();
      // глазки
      ctx.fillStyle='#06122e';
      const ex = dir.x, ey = dir.y;
      ctx.beginPath();
      ctx.arc(x+CELL/2 + ex*3 - (ey!==0?3:0), y+CELL/2 + ey*3 - (ex!==0?3:0), 2, 0, 7); ctx.fill();
      ctx.beginPath();
      ctx.arc(x+CELL/2 + ex*3 + (ey!==0?3:0), y+CELL/2 + ey*3 + (ex!==0?3:0), 2, 0, 7); ctx.fill();
    } else {
      const tBlue = i%2===0;
      ctx.fillStyle = tBlue ? '#0046AE' : '#CC092F';
      roundRect(x+2,y+2,CELL-4,CELL-4,4); ctx.fill();
    }
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function gameOver(){
  alive = false;
  clearInterval(loopTimer);
  const r = rankFor(score);
  document.getElementById('rank').textContent = '★ ' + r.name + ' ★';
  document.getElementById('title').textContent = r.line;
  document.getElementById('fact').textContent =
    '🇲🇩 А ты знал? ' + FACTS[(Math.random()*FACTS.length)|0];
  document.getElementById('finalScore').textContent = score;
  overlay.classList.add('show');
}

// анимация парящего флага даже на паузе
function animLoop(){ if(alive && !paused) {} draw(); requestAnimationFrame(animLoop); }

// ── Управление ──
function setDir(d){
  if(d==='up'    && dir.y===0) nextDir={x:0,y:-1};
  if(d==='down'  && dir.y===0) nextDir={x:0,y:1};
  if(d==='left'  && dir.x===0) nextDir={x:-1,y:0};
  if(d==='right' && dir.x===0) nextDir={x:1,y:0};
}
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','w'].includes(k)){setDir('up');e.preventDefault();}
  if(['arrowdown','s'].includes(k)){setDir('down');e.preventDefault();}
  if(['arrowleft','a'].includes(k)){setDir('left');e.preventDefault();}
  if(['arrowright','d'].includes(k)){setDir('right');e.preventDefault();}
  if(k===' '){ if(alive){paused=!paused;} e.preventDefault();}
});
document.querySelectorAll('.pad button').forEach(b=>{
  b.addEventListener('click',()=>setDir(b.dataset.dir));
});
// свайпы
let tx,ty;
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?'right':'left');
  else setDir(dy>0?'down':'up');
},{passive:true});

document.getElementById('restart').addEventListener('click',reset);

reset();
animLoop();
</script>
</body>
</html>
